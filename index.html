// ============================================================
// STATE
// ============================================================
var completed  = {};
var qAns       = {};
var curLesson  = null;

try {
var _sv = localStorage.getItem(“cc_prog”);
if (_sv) { completed = JSON.parse(_sv).c || {}; }
} catch (e) {}

function save() {
try { localStorage.setItem(“cc_prog”, JSON.stringify({c: completed})); } catch (e) {}
}

function totalL() {
var n = 0;
for (var i = 0; i < C.phases.length; i++) { n += C.phases[i].lessons.length; }
return n;
}
function doneN() {
var n = 0;
var keys = Object.keys(completed);
for (var i = 0; i < keys.length; i++) { if (completed[keys[i]]) n++; }
return n;
}
function phProg(ph) {
var tot = ph.lessons.length, dn = 0;
for (var i = 0; i < ph.lessons.length; i++) { if (completed[ph.lessons[i].id]) dn++; }
return {done: dn, total: tot, pct: tot ? Math.round(dn / tot * 100) : 0};
}
function findPhase(pid) {
for (var i = 0; i < C.phases.length; i++) { if (C.phases[i].id === pid) return C.phases[i]; }
return null;
}
function findLesson(ph, lid) {
if (!ph) return null;
for (var i = 0; i < ph.lessons.length; i++) { if (ph.lessons[i].id === lid) return ph.lessons[i]; }
return null;
}
function getAllLessons() {
var all = [];
for (var i = 0; i < C.phases.length; i++) {
for (var j = 0; j < C.phases[i].lessons.length; j++) {
all.push({l: C.phases[i].lessons[j], pid: C.phases[i].id});
}
}
return all;
}

// ============================================================
// SIDEBAR
// ============================================================
function renderSB() {
var nav = document.getElementById(“snav”);
var h = “”;
for (var i = 0; i < C.phases.length; i++) {
var ph = C.phases[i];
var pg = phProg(ph);
h += “<div class="pnh">”;
h += “<span>” + ph.icon + “</span>”;
h += “<span style="flex:1;font-size:12px">” + ph.title + “</span>”;
h += “<span style="font-size:11px;color:var(–mu)">” + pg.done + “/” + pg.total + “</span>”;
h += “</div>”;
for (var j = 0; j < ph.lessons.length; j++) {
var ls = ph.lessons[j];
var isDn = completed[ls.id] ? “ dn” : “”;
var isAct = (curLesson === ls.id) ? “ act” : “”;
h += “<div class="ni” + isDn + isAct + “" onclick="openLesson(’” + ph.id + “’,’” + ls.id + “’)">”;
h += “<span style="font-size:10px;color:var(–mu);width:18px">” + (i+1) + “.” + (j+1) + “</span>”;
h += “<span style="flex:1">” + ls.title + “</span>”;
h += “<div class="nc">” + (completed[ls.id] ? “✓” : “”) + “</div>”;
h += “</div>”;
}
}
nav.innerHTML = h;
}

function updProg() {
var tot = totalL(), dn = doneN();
var pct = tot ? Math.round(dn / tot * 100) : 0;
document.getElementById(“opct”).textContent = pct + “%”;
document.getElementById(“obar”).style.width = pct + “%”;
}

// ============================================================
// HOME
// ============================================================
function showHome() {
curLesson = null;
closeSB();
document.getElementById(“ttl”).textContent = “\u0627\u0644\u0635\u0641\u062d\u0629 \u0627\u0644\u0631\u0626\u064a\u0633\u064a\u0629”;
document.getElementById(“tbr”).textContent = “CodeCraft Academy”;
renderSB();
var tot = totalL(), dn = doneN();
var pct = tot ? Math.round(dn / tot * 100) : 0;
var h = “<div class="fu">”;
h += “<div class="hero">”;
h += “<div class="hb"><span class="dot"></span>\u0645\u0646\u0635\u0629 \u0645\u062c\u0627\u0646\u064a\u0629 100%</div>”;
h += “<h1>\u062a\u0639\u0644\u0651\u0645 \u0627\u0644\u0628\u0631\u0645\u062c\u0629<br>\u0645\u0646 \u0627\u0644\u0635\u0641\u0631 \u0644\u0644\u0627\u062d\u062a\u0631\u0627\u0641</h1>”;
h += “<p>\u062f\u0648\u0631\u0629 \u0634\u0627\u0645\u0644\u0629 \u062a\u0623\u062e\u0630\u0643 \u0645\u0646 \u0644\u0627 \u0634\u064a\u0621 \u0625\u0644\u0649 \u0645\u0637\u0648\u0631 \u0648\u064a\u0628 \u0642\u0627\u062f\u0631 \u0639\u0644\u0649 \u0625\u0646\u0634\u0627\u0621 \u0645\u0648\u0627\u0642\u0639 \u0627\u062d\u062a\u0631\u0627\u0641\u064a\u0629.</p>”;
h += “<div class="hst">”;
h += “<div class="hst"><strong>” + tot + “</strong><span>\u062f\u0631\u0633</span></div>”;
h += “<div class="hst"><strong>7</strong><span>\u0645\u0631\u0627\u062d\u0644</span></div>”;
h += “<div class="hst"><strong>” + dn + “/” + tot + “</strong><span>\u0623\u0646\u062c\u0632\u062a</span></div>”;
h += “<div class="hst"><strong>” + pct + “%</strong><span>\u062a\u0642\u062f\u0645\u0643</span></div>”;
h += “</div></div>”;
h += “<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">”;
h += “<h2 style="font-size:20px;font-weight:800">\u0645\u0631\u0627\u062d\u0644 \u0627\u0644\u062f\u0648\u0631\u0629</h2>”;
if (dn > 0) h += “<button class="btn btng btnsm" onclick="contLearn()">\u25b6 \u0645\u062a\u0627\u0628\u0639\u0629</button>”;
h += “</div>”;
h += “<div class="pgrid">”;
for (var i = 0; i < C.phases.length; i++) {
var ph = C.phases[i];
var pg = phProg(ph);
h += “<div class="pc" onclick="openPhase(’” + ph.id + “’)">”;
h += “<div class="pci">” + ph.icon + “</div>”;
h += “<div class="pcph">\u0627\u0644\u0645\u0631\u062d\u0644\u0629 “ + (i+1) + “</div>”;
h += “<div class="pct">” + ph.title + “</div>”;
h += “<div class="pcd">” + ph.desc + “</div>”;
h += “<div class="pcb"><div class="pcbf" style="width:” + pg.pct + “%;background:linear-gradient(90deg,” + ph.c1 + “,” + ph.c2 + “)"></div></div>”;
h += “<div class="pcm"><span>” + ph.lessons.length + “ \u062f\u0631\u0648\u0633</span><span>” + (pg.pct === 100 && pg.total > 0 ? “✓ \u0645\u0643\u062a\u0645\u0644” : pg.pct + “%”) + “</span></div>”;
h += “</div>”;
}
h += “</div></div>”;
document.getElementById(“ct”).innerHTML = h;
}

function openPhase(pid) {
var ph = findPhase(pid);
if (ph && ph.lessons.length > 0) openLesson(pid, ph.lessons[0].id);
}

function contLearn() {
var all = getAllLessons();
for (var i = 0; i < all.length; i++) {
if (!completed[all[i].l.id]) { openLesson(all[i].pid, all[i].l.id); return; }
}
showToast(”\u0623\u0646\u062c\u0632\u062a \u062c\u0645\u064a\u0639 \u0627\u0644\u062f\u0631\u0648\u0633!”);
}

// ============================================================
// LESSON
// ============================================================
function openLesson(pid, lid) {
var ph = findPhase(pid);
var ls = findLesson(ph, lid);
if (!ph || !ls) return;
curLesson = lid;
closeSB();
document.getElementById(“ttl”).textContent = ls.title;
document.getElementById(“tbr”).textContent = ph.title;
renderSB();

var all = getAllLessons();
var idx = -1;
for (var k = 0; k < all.length; k++) { if (all[k].l.id === lid) { idx = k; break; } }
var prev = (idx > 0) ? all[idx - 1] : null;
var next = (idx < all.length - 1) ? all[idx + 1] : null;
var isDone = !!completed[lid];

var h = “<div class="fu">”;
h += “<div class="lh">”;
h += “<div><div class="lbg">” + ph.icon + “ “ + ph.title + “</div>”;
h += “<h2>” + ls.title + “</h2>”;
h += “<p style="color:var(–mu2);font-size:12px;margin-top:5px">” + (isDone ? “\u2705 \u0623\u0646\u062c\u0632\u062a \u0647\u0630\u0627 \u0627\u0644\u062f\u0631\u0633” : “\u0627\u0642\u0631\u0623 \u0628\u062a\u0645\u0639\u0646 \u062b\u0645 \u0623\u062c\u0628 \u0639\u0644\u0649 \u0627\u0644\u0627\u062e\u062a\u0628\u0627\u0631”) + “</p></div>”;
h += “<div style="display:flex;gap:8px;flex-wrap:wrap">”;
if (prev) h += “<button class="btn btng btnsm" onclick="openLesson(’” + prev.pid + “’,’” + prev.l.id + “’)">\u2192 \u0627\u0644\u0633\u0627\u0628\u0642</button>”;
if (next) h += “<button class="btn btng btnsm" onclick="openLesson(’” + next.pid + “’,’” + next.l.id + “’)">\u0627\u0644\u062a\u0627\u0644\u064a \u2190</button>”;
h += “</div></div>”;
h += renderContent(ls);
if (!isDone) {
h += “<button class="cb" id="cbtn" onclick="completeLs(’” + lid + “’,’” + (next ? next.pid : “”) + “’,’” + (next ? next.l.id : “”) + “’)">\u2705 \u0623\u0646\u062c\u0632\u062a \u0627\u0644\u062f\u0631\u0633</button>”;
} else {
h += “<button class="cb dn">\u2705 \u062f\u0631\u0633 \u0645\u0643\u062a\u0645\u0644</button>”;
}
h += renderQuiz(ls);
h += “</div>”;
document.getElementById(“ct”).innerHTML = h;
document.getElementById(“ct”).scrollTop = 0;
}

function renderContent(ls) {
var h = “”;
for (var i = 0; i < ls.content.length; i++) {
var b = ls.content[i];
if (b.t === “intro”) {
h += “<div style="margin-bottom:22px"><div class="bl">\u0645\u0642\u062f\u0645\u0629</div>”;
h += “<p class="lt" style="font-size:15px;color:var(–tx)">” + b.x + “</p></div>”;
} else if (b.t === “sec”) {
h += “<div class="sd"><h3>” + b.x + “</h3></div>”;
} else if (b.t === “txt”) {
h += “<p class="lt">” + b.x + “</p>”;
} else if (b.t === “code”) {
var cid = “c” + i + “_” + ls.id;
h += “<div class="cw" id="” + cid + “">”;
h += “<div class="ctop"><div class="cdts">”;
h += “<span style="background:#ff5f57"></span>”;
h += “<span style="background:#febc2e"></span>”;
h += “<span style="background:#28c840"></span>”;
h += “</div><span class="clng">” + b.lang + “</span>”;
h += “<button class="cpb" onclick="copyC(’” + cid + “’,this)">\u0646\u0633\u062e</button></div>”;
h += “<pre class="cc">” + b.lines.join(”\n”) + “</pre></div>”;
} else if (b.t === “tip” || b.t === “note”) {
var cls = b.t === “tip” ? “itp” : “int”;
h += “<div class="ib “ + cls + “"><span style="font-size:18px;flex-shrink:0">💡</span><span>” + b.x + “</span></div>”;
} else if (b.t === “warn”) {
h += “<div class="ib iwr"><span style="font-size:18px;flex-shrink:0">⚠</span><span>” + b.x + “</span></div>”;
}
}
return h;
}

function renderQuiz(ls) {
if (!ls.quiz || ls.quiz.length === 0) return “”;
var letters = [”\u0623”, “\u0628”, “\u062c”, “\u062f”];
var h = “<div class="qw" id="qw_” + ls.id + “">”;
h += “<div class="qhd"><div class="qic">📝</div>”;
h += “<div><div class="qtl">\u0627\u062e\u062a\u0628\u0627\u0631 \u0633\u0631\u064a\u0639</div>”;
h += “<div class="qsb">” + ls.quiz.length + “ \u0623\u0633\u0626\u0644\u0629</div></div></div>”;
h += “<div class="qpb"><div class="qpf" id="qpf_” + ls.id + “" style="width:0%"></div></div>”;
for (var qi = 0; qi < ls.quiz.length; qi++) {
var q = ls.quiz[qi];
h += “<div class="qbl">”;
h += “<div class="qn">\u0627\u0644\u0633\u0624\u0627\u0644 “ + (qi+1) + “ \u0645\u0646 “ + ls.quiz.length + “</div>”;
h += “<div class="qq">” + q.q + “</div>”;
h += “<div class="ops">”;
for (var oi = 0; oi < q.o.length; oi++) {
h += “<button class="op" id="o_” + ls.id + “*” + qi + “*” + oi + “"”;
h += “ onclick="selOpt(’” + ls.id + “’,” + qi + “,” + oi + “,” + q.a + “)">”;
h += “<div class="ol">” + (letters[oi] || oi) + “</div>”;
h += “<span>” + q.o[oi] + “</span></button>”;
}
h += “</div></div>”;
}
h += “<button class="qsub" id="qsub_” + ls.id + “" onclick="submitQuiz(’” + ls.id + “’)" disabled>”;
h += “\u0625\u0631\u0633\u0627\u0644 \u0627\u0644\u0625\u062c\u0627\u0628\u0627\u062a</button>”;
h += “<div id="qres_” + ls.id + “" style="display:none"></div>”;
h += “</div>”;
return h;
}

// ============================================================
// QUIZ LOGIC
// ============================================================
function selOpt(lid, qi, oi, ans) {
var ph = null, ls = null;
for (var i = 0; i < C.phases.length; i++) {
for (var j = 0; j < C.phases[i].lessons.length; j++) {
if (C.phases[i].lessons[j].id === lid) { ph = C.phases[i]; ls = C.phases[i].lessons[j]; }
}
}
if (!ls) return;
var q = ls.quiz[qi];
for (var k = 0; k < q.o.length; k++) {
var el = document.getElementById(“o_” + lid + “*” + qi + “*” + k);
if (el) el.className = “op”;
}
var sel = document.getElementById(“o_” + lid + “*” + qi + “*” + oi);
if (sel) sel.className = “op sel”;
if (!qAns[lid]) qAns[lid] = {};
qAns[lid][qi] = oi;
var answered = 0;
var keys = Object.keys(qAns[lid]);
for (var m = 0; m < keys.length; m++) { answered++; }
var pct = Math.round((answered / ls.quiz.length) * 100);
var bar = document.getElementById(“qpf_” + lid);
if (bar) bar.style.width = pct + “%”;
if (answered === ls.quiz.length) {
var sub = document.getElementById(“qsub_” + lid);
if (sub) sub.disabled = false;
}
}

function submitQuiz(lid) {
var ls = null;
for (var i = 0; i < C.phases.length; i++) {
for (var j = 0; j < C.phases[i].lessons.length; j++) {
if (C.phases[i].lessons[j].id === lid) ls = C.phases[i].lessons[j];
}
}
if (!ls) return;
var score = 0;
for (var qi = 0; qi < ls.quiz.length; qi++) {
var q = ls.quiz[qi];
var chosen = (qAns[lid] && qAns[lid][qi] !== undefined) ? qAns[lid][qi] : -1;
for (var oi = 0; oi < q.o.length; oi++) {
var el = document.getElementById(“o_” + lid + “*” + qi + “*” + oi);
if (!el) continue;
el.className = “op”;
el.disabled = true;
if (oi === q.a) el.className = “op cor”;
else if (oi === chosen && chosen !== q.a) el.className = “op wrg”;
}
if (chosen === q.a) score++;
}
var pct = Math.round(score / ls.quiz.length * 100);
var sub = document.getElementById(“qsub_” + lid);
if (sub) sub.style.display = “none”;
var emoji = pct === 100 ? “\u{1F3C6}” : pct >= 70 ? “\u{1F389}” : pct >= 50 ? “\u{1F44D}” : “\u{1F4AA}”;
var msg = pct === 100 ? “\u0645\u0645\u062a\u0627\u0632!” : pct >= 70 ? “\u0623\u062d\u0633\u0646\u062a!” : pct >= 50 ? “\u062c\u064a\u062f \u2014 \u0631\u0627\u062c\u0639 \u0627\u0644\u062f\u0631\u0633” : “\u0631\u0627\u062c\u0639 \u0627\u0644\u062f\u0631\u0633 \u0645\u062c\u062f\u062f\u0627\u064b”;
var color = pct >= 70 ? “var(–gr)” : pct >= 50 ? “var(–ac3)” : “var(–rd)”;
var res = document.getElementById(“qres_” + lid);
if (res) {
res.style.display = “block”;
res.innerHTML = “<div class="qres"><div class="rsc" style="color:” + color + “">” + emoji + “ “ + score + “/” + ls.quiz.length + “</div><div class="rms">” + msg + “</div></div>”;
}
showToast(emoji + “ “ + score + “/” + ls.quiz.length + “ (” + pct + “%)”);
if (pct >= 70) celebrate();
}

function completeLs(lid, npid, nlid) {
completed[lid] = true;
save();
renderSB();
updProg();
var btn = document.getElementById(“cbtn”);
if (btn) { btn.className = “cb dn”; btn.textContent = “\u2705 \u062f\u0631\u0633 \u0645\u0643\u062a\u0645\u0644”; }
showToast(”\u0623\u062d\u0633\u0646\u062a!”);
celebrate();
if (nlid && nlid !== “” && nlid !== “undefined”) {
setTimeout(function() { openLesson(npid, nlid); }, 700);
}
}

// ============================================================
// UTILS
// ============================================================
function copyC(wid, btn) {
var pre = document.querySelector(”#” + wid + “ pre”);
if (!pre) return;
var txt = pre.textContent || pre.innerText || “”;
if (navigator.clipboard && navigator.clipboard.writeText) {
navigator.clipboard.writeText(txt).then(function() {
btn.textContent = “\u2713 \u062a\u0645”;
btn.className = “cpb ok”;
setTimeout(function() { btn.textContent = “\u0646\u0633\u062e”; btn.className = “cpb”; }, 2000);
});
}
}

var _tt = null;
function showToast(msg) {
var t = document.getElementById(“toast”);
t.textContent = msg;
t.className = “show”;
if (_tt) clearTimeout(_tt);
_tt = setTimeout(function() { t.className = “”; }, 3000);
}

function celebrate() {
var colors = [”#7c3aed”,”#00d4ff”,”#10b981”,”#f59e0b”,”#ec4899”];
for (var i = 0; i < 16; i++) {
var el = document.createElement(“div”);
el.className = “cfp”;
el.style.left = Math.random() * 100 + “vw”;
el.style.background = colors[Math.floor(Math.random() * colors.length)];
el.style.animationDelay = (Math.random() * 0.4) + “s”;
document.body.appendChild(el);
(function(e) { setTimeout(function() { if (e.parentNode) e.parentNode.removeChild(e); }, 1400); })(el);
}
}

function toggleSB() {
document.getElementById(“sb”).classList.toggle(“open”);
document.getElementById(“ov”).classList.toggle(“show”);
}
function closeSB() {
document.getElementById(“sb”).classList.remove(“open”);
document.getElementById(“ov”).classList.remove(“show”);
}

// ============================================================
// INIT
// ============================================================
renderSB();
updProg();
showHome();

</script>
</body>
</html>
